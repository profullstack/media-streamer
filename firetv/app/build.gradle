plugins {
    id 'com.android.application'
}

android {
    namespace 'com.bittorrented.tv'
    compileSdk 34

    defaultConfig {
        applicationId "com.bittorrented.tv"
        minSdk 22          // Fire TV minimum
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external dependencies needed — just Android WebView
}
